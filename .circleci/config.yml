version: 2.1

orbs:
  codecov: codecov/codecov@6.0.0

executors:
  node:
    docker:
      - image: cimg/node:22.14.0
    resource_class: xlarge
    environment:
      NODE_OPTIONS: --max-old-space-size=4096

  browser:
    docker:
      - image: cimg/node:22.14.0-browsers
    resource_class: xlarge
    environment:
      NODE_OPTIONS: --max-old-space-size=4096

  rust:
    docker:
      - image: cimg/rust:1.88.0
    resource_class: large

commands:
  setup_pnpm:
    steps:
      - run:
          name: Enable pnpm
          command: |
            sudo corepack enable
            corepack prepare pnpm@10.33.0 --activate
            pnpm --version

  restore_pnpm_cache:
    steps:
      - restore_cache:
          keys:
            - pnpm-v1-{{ checksum "pnpm-lock.yaml" }}
            - pnpm-v1-

  save_pnpm_cache:
    steps:
      - save_cache:
          key: pnpm-v1-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - ~/.local/share/pnpm/store

  install_frontend_dependencies:
    steps:
      - setup_pnpm
      - restore_pnpm_cache
      - run:
          name: Install frontend dependencies
          command: pnpm install --frozen-lockfile
      - save_pnpm_cache

  restore_rust_cache:
    parameters:
      target:
        type: string
    steps:
      - restore_cache:
          keys:
            - rust-release-v2026-07-24-<< parameters.target >>-{{ checksum "src-tauri/Cargo.lock" }}
            - rust-release-v2026-07-24-<< parameters.target >>-

  save_rust_cache:
    parameters:
      target:
        type: string
    steps:
      - save_cache:
          key: rust-release-v2026-07-24-<< parameters.target >>-{{ checksum "src-tauri/Cargo.lock" }}
          paths:
            - ~/.cargo/registry
            - ~/.cargo/git
            - src-tauri/target

  attach_release_workspace:
    steps:
      - attach_workspace:
          at: /tmp/tolaria-release

  halt_if_release_skipped:
    steps:
      - run:
          name: Check whether this release should run
          command: |
            set -euo pipefail
            source /tmp/tolaria-release/release.env
            if [[ "${SKIP_RELEASE:-false}" == "true" ]]; then
              echo "Release skipped because this push only changed CI or site files."
              circleci-agent step halt
            fi

  configure_release_version:
    steps:
      - run:
          name: Set application version
          command: |
            set -euo pipefail
            source /tmp/tolaria-release/release.env
            jq --arg version "$VERSION" '.version = $version' src-tauri/tauri.conf.json > /tmp/tauri.conf.json
            mv /tmp/tauri.conf.json src-tauri/tauri.conf.json
            if [[ "$(uname -s)" == "Darwin" ]]; then
              sed -i '' "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml
            else
              sed -i "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml
            fi

  validate_release_secrets:
    steps:
      - run:
          name: Validate release secrets
          command: |
            set -euo pipefail
            required=(
              TAURI_SIGNING_PRIVATE_KEY
              TAURI_KEY_PASSWORD
              VITE_SENTRY_DSN
              SENTRY_DSN
              VITE_POSTHOG_KEY
              VITE_POSTHOG_HOST
            )
            for name in "${required[@]}"; do
              if [[ -z "${!name:-}" ]]; then
                echo "$name is required for release builds." >&2
                exit 1
              fi
            done

jobs:
  frontend-quality:
    executor: node
    steps:
      - checkout
      - install_frontend_dependencies
      - run:
          name: Codacy differential gate
          command: |
            set -euo pipefail
            git fetch origin main --no-tags
            export CODACY_BASE_REF
            CODACY_BASE_REF="$(git merge-base origin/main HEAD~1 2>/dev/null || git rev-parse HEAD~1)"
            pnpm codacy:gate
      - run:
          name: CodeScene project health gate
          command: |
            set -euo pipefail
            if [[ -z "${CODESCENE_PAT:-}" || -z "${CODESCENE_PROJECT_ID:-}" ]]; then
              echo "CODESCENE_PAT and CODESCENE_PROJECT_ID are required." >&2
              exit 1
            fi
            hotspot_threshold="$(awk -F= '/^HOTSPOT_THRESHOLD=/{print $2}' .codescene-thresholds)"
            average_threshold="$(awk -F= '/^AVERAGE_THRESHOLD=/{print $2}' .codescene-thresholds)"
            response="$(curl -fsS \
              -H "Authorization: Bearer ${CODESCENE_PAT}" \
              -H "Accept: application/json" \
              "https://api.codescene.io/v2/projects/${CODESCENE_PROJECT_ID}")"
            HOTSPOT_SCORE="$(jq -r '.analysis.hotspot_code_health.now' \<<<"$response")" \
            AVERAGE_SCORE="$(jq -r '.analysis.code_health.now' \<<<"$response")" \
            HOTSPOT_THRESHOLD="$hotspot_threshold" \
            AVERAGE_THRESHOLD="$average_threshold" \
              python3 - \<<'PY'
            import os

            hotspot = float(os.environ["HOTSPOT_SCORE"])
            average = float(os.environ["AVERAGE_SCORE"])
            hotspot_threshold = float(os.environ["HOTSPOT_THRESHOLD"])
            average_threshold = float(os.environ["AVERAGE_THRESHOLD"])
            print(f"Hotspot Code Health: {hotspot:.2f} (threshold {hotspot_threshold:.2f})")
            print(f"Average Code Health: {average:.2f} (threshold {average_threshold:.2f})")
            if hotspot < hotspot_threshold or average < average_threshold:
                raise SystemExit("CodeScene project health gate failed")
            PY
      - run:
          name: Frontend lint, build, and sharded coverage
          command: |
            FRONTEND_COVERAGE_SHARDS=2 \
            FRONTEND_COVERAGE_CONCURRENCY=2 \
            VITEST_COVERAGE_MAX_WORKERS=2 \
              bash .chunk/run-sidecar-lane.sh frontend
      - run:
          name: Documentation build check
          command: |
            set -euo pipefail
            git fetch origin main --no-tags
            base_sha="$(git merge-base origin/main HEAD~1 2>/dev/null || git rev-parse HEAD~1)"
            if git diff --name-only "$base_sha" HEAD | grep -qE '^(docs/|site/|scripts/build-agent-docs\.mjs|package\.json|pnpm-lock\.yaml|\.circleci/)'; then
              pnpm docs:build
            else
              echo "Documentation inputs unchanged; skipping docs build."
            fi
      - codecov/upload:
          disable_search: true
          fail_on_error: true
          files: coverage/lcov.info
          flags: frontend
          slug: refactoringhq/tolaria
          upload_name: frontend

  rust-quality:
    executor: rust
    environment:
      CARGO_BUILD_JOBS: "4"
    steps:
      - checkout
      - restore_cache:
          keys:
            - rust-ci-v2026-07-24-{{ checksum "src-tauri/Cargo.lock" }}
            - rust-ci-v2026-07-24-
      - run:
          name: Install cargo-llvm-cov
          command: |
            if ! command -v cargo-llvm-cov >/dev/null 2>&1; then
              cargo install cargo-llvm-cov --locked
            fi
      - run:
          name: Rust lint, format, tests, and coverage
          command: |
            RUST_COVERAGE_LCOV_OUTPUT=coverage/rust.lcov bash .chunk/run-rust-gate.sh
      - save_cache:
          key: rust-ci-v2026-07-24-{{ checksum "src-tauri/Cargo.lock" }}
          paths:
            - ~/.cargo/registry
            - ~/.cargo/git
            - ~/.cargo/bin/cargo-llvm-cov
            - src-tauri/target
      - codecov/upload:
          disable_search: true
          fail_on_error: true
          files: coverage/rust.lcov
          flags: rust
          slug: refactoringhq/tolaria
          upload_name: rust

  playwright-smoke:
    executor: browser
    steps:
      - checkout
      - install_frontend_dependencies
      - restore_cache:
          keys:
            - playwright-v1-{{ checksum "pnpm-lock.yaml" }}
            - playwright-v1-
      - run:
          name: Install Playwright Chromium
          command: pnpm exec playwright install chromium
      - save_cache:
          key: playwright-v1-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - ~/.cache/ms-playwright
      - run:
          name: Run curated Playwright smoke suite
          command: |
            PLAYWRIGHT_SHARED_SERVER=1 \
            PLAYWRIGHT_SHARDS=8 \
            PLAYWRIGHT_CONCURRENCY=4 \
              bash .chunk/run-playwright-shards.sh 8
      - store_test_results:
          path: test-results
      - store_artifacts:
          path: test-results
          destination: playwright

  linux-build-verification:
    machine:
      image: ubuntu-2204:current
    resource_class: large
    steps:
      - checkout
      - run:
          name: Install Linux build dependencies
          command: |
            sudo apt-get update
            sudo apt-get install -y \
              build-essential \
              libayatana-appindicator3-dev \
              librsvg2-dev \
              libsoup-3.0-dev \
              libssl-dev \
              libwebkit2gtk-4.1-dev \
              libxdo-dev \
              pkg-config
      - run:
          name: Configure Node, pnpm, and Rust
          command: |
            set -euo pipefail
            source "$HOME/.nvm/nvm.sh"
            nvm install 22
            nvm use 22
            sudo corepack enable
            corepack prepare pnpm@10.33.0 --activate
            if ! command -v rustup >/dev/null 2>&1; then
              curl --proto '=https' --tlsv1.2 -sSf -o /tmp/rustup-init.sh https://sh.rustup.rs
              sh /tmp/rustup-init.sh -y --profile minimal
            fi
            echo 'source "$HOME/.nvm/nvm.sh"' >> "$BASH_ENV"
            echo 'nvm use 22 >/dev/null' >> "$BASH_ENV"
            echo 'source "$HOME/.cargo/env"' >> "$BASH_ENV"
            source "$HOME/.cargo/env"
            rustup default stable
            rustup component add clippy
      - restore_pnpm_cache
      - restore_rust_cache:
          target: x86_64-unknown-linux-gnu-check
      - run:
          name: Install dependencies
          command: pnpm install --frozen-lockfile
      - run:
          name: Verify Linux build
          command: |
            pnpm build
            cargo check --manifest-path=src-tauri/Cargo.toml
            cargo clippy --manifest-path=src-tauri/Cargo.toml -- -D warnings
      - save_pnpm_cache
      - save_rust_cache:
          target: x86_64-unknown-linux-gnu-check

  compute-alpha-version:
    docker:
      - image: cimg/python:3.13
    resource_class: small
    steps:
      - checkout
      - run:
          name: Compute alpha version
          command: |
            set -euo pipefail
            mkdir -p /tmp/tolaria-release
            git fetch --tags --force
            python3 \<<'PY' > /tmp/tolaria-release/release.env
            import re
            import subprocess
            from datetime import datetime, timedelta, timezone

            def lines(command):
                output = subprocess.check_output(command, text=True).strip()
                return [line for line in output.splitlines() if line]

            pattern = re.compile(r"^alpha-v(\d{4}\.\d{1,2}\.\d{1,2})-alpha\.(\d+)$")
            tags_at_head = [tag for tag in lines(["git", "tag", "--points-at", "HEAD"]) if tag.startswith("alpha-v")]
            if tags_at_head:
                tag = tags_at_head[0]
                match = pattern.fullmatch(tag)
                version = f"{match.group(1)}-alpha.{int(match.group(2))}" if match else tag.removeprefix("alpha-v")
            else:
                today = datetime.now(timezone.utc).date()
                stable_date = None
                stable_patterns = (
                    re.compile(r"^v(\d{4})-(\d{2})-(\d{2})$"),
                    re.compile(r"^stable-v(\d{4})\.(\d{1,2})\.(\d{1,2})$"),
                )
                stable_tags = lines([
                    "git", "for-each-ref", "--sort=-creatordate", "--format=%(refname:short)",
                    "refs/tags/v20*", "refs/tags/stable-v*",
                ])
                for stable_tag in stable_tags:
                    match = next((item.fullmatch(stable_tag) for item in stable_patterns if item.fullmatch(stable_tag)), None)
                    if match:
                        stable_date = datetime(*map(int, match.groups()), tzinfo=timezone.utc).date()
                        break
                alpha_date = today if stable_date is None or today > stable_date else stable_date + timedelta(days=1)
                calendar_version = f"{alpha_date.year}.{alpha_date.month}.{alpha_date.day}"
                sequence = len(lines(["git", "tag", "--list", f"alpha-v{calendar_version}-alpha.*"])) + 1
                version = f"{calendar_version}-alpha.{sequence}"
                tag = f"alpha-v{calendar_version}-alpha.{sequence:04d}"
            display_match = re.fullmatch(r"(\d{4})\.(\d{1,2})\.(\d{1,2})-alpha\.(\d+)", version)
            display_version = (
                f"Alpha {int(display_match.group(1))}.{int(display_match.group(2))}."
                f"{int(display_match.group(3))}.{int(display_match.group(4))}"
                if display_match else version
            )
            changed = lines(["git", "diff-tree", "--no-commit-id", "--name-only", "-r", "HEAD"])
            ignored = all(
                path.startswith(("site/", ".circleci/")) or path == ".github/workflows/README.md"
                for path in changed
            )
            print(f"VERSION={version}")
            print(f"DISPLAY_VERSION={display_version}")
            print(f"TAG={tag}")
            print(f"CHANNEL=alpha")
            print(f"SKIP_RELEASE={'true' if changed and ignored else 'false'}")
            PY
            cat /tmp/tolaria-release/release.env
      - persist_to_workspace:
          root: /tmp/tolaria-release
          paths:
            - release.env

  compute-stable-version:
    docker:
      - image: cimg/python:3.13
    resource_class: small
    steps:
      - checkout
      - run:
          name: Compute stable version
          command: |
            set -euo pipefail
            mkdir -p /tmp/tolaria-release
            CIRCLE_TAG_VALUE="$CIRCLE_TAG" python3 \<<'PY' > /tmp/tolaria-release/release.env
            import os
            import re
            from datetime import date

            tag = os.environ["CIRCLE_TAG_VALUE"]
            legacy = re.fullmatch(r"stable-v(\d{4})\.(\d{1,2})\.(\d{1,2})", tag)
            calendar = re.fullmatch(r"v(\d{4})-(\d{2})-(\d{2})", tag)
            match = calendar or legacy
            if not match:
                raise SystemExit(f"Stable tags must use vYYYY-MM-DD or stable-vYYYY.M.D, got {tag}")
            year, month, day = map(int, match.groups())
            date(year, month, day)
            version = f"{year}.{month}.{day}"
            display_version = tag if calendar else version
            print(f"VERSION={version}")
            print(f"DISPLAY_VERSION={display_version}")
            print(f"TAG={tag}")
            print("CHANNEL=stable")
            print("SKIP_RELEASE=false")
            PY
            cat /tmp/tolaria-release/release.env
      - persist_to_workspace:
          root: /tmp/tolaria-release
          paths:
            - release.env

  build-macos:
    parameters:
      channel:
        type: enum
        enum: [alpha, stable]
      arch:
        type: enum
        enum: [aarch64, x86_64]
      target:
        type: enum
        enum: [aarch64-apple-darwin, x86_64-apple-darwin]
    macos:
      xcode: 16.4.0
    resource_class: m4pro.medium
    environment:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - checkout
      - attach_release_workspace
      - halt_if_release_skipped
      - run:
          name: Configure Node, pnpm, Bun, and Rust
          command: |
            set -euo pipefail
            export NVM_DIR="$HOME/.nvm"
            source "$NVM_DIR/nvm.sh"
            nvm install 22
            nvm use 22
            sudo corepack enable
            corepack prepare pnpm@10.33.0 --activate
            if ! command -v bun >/dev/null 2>&1; then
              brew install oven-sh/bun/bun
            fi
            rustup default stable
            rustup target add "<< parameters.target >>"
            echo 'export NVM_DIR="$HOME/.nvm"' >> "$BASH_ENV"
            echo 'source "$NVM_DIR/nvm.sh"' >> "$BASH_ENV"
            echo 'nvm use 22 >/dev/null' >> "$BASH_ENV"
      - restore_pnpm_cache
      - restore_rust_cache:
          target: << parameters.target >>
      - run:
          name: Install frontend dependencies
          command: pnpm install --frozen-lockfile
      - run:
          name: Clear cached bundle artifacts
          command: rm -rf "src-tauri/target/<< parameters.target >>/release/bundle"
      - configure_release_version
      - validate_release_secrets
      - run:
          name: Import Apple Developer certificate
          command: |
            set -euo pipefail
            required=(APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID)
            for name in "${required[@]}"; do
              if [[ -z "${!name:-}" ]]; then
                echo "$name is required for signed and notarized macOS builds." >&2
                exit 1
              fi
            done
            cert_path="$(mktemp /tmp/tolaria-cert.XXXXXX.p12)"
            keychain_path="$HOME/Library/Keychains/tolaria-signing-${CIRCLE_WORKFLOW_JOB_ID}.keychain-db"
            keychain_password="$(uuidgen)"
            printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$cert_path"
            security create-keychain -p "$keychain_password" "$keychain_path"
            security set-keychain-settings -lut 21600 "$keychain_path"
            security unlock-keychain -p "$keychain_password" "$keychain_path"
            security import "$cert_path" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
            security list-keychains -d user -s "$keychain_path"
            security set-key-partition-list -S apple-tool:,apple: -s -k "$keychain_password" "$keychain_path"
            rm -f "$cert_path"
      - run:
          name: Build signed and notarized macOS bundle
          command: |
            set -euo pipefail
            source /tmp/tolaria-release/release.env
            export TAURI_SIGNING_PRIVATE_KEY_PASSWORD="$TAURI_KEY_PASSWORD"
            export VITE_SENTRY_RELEASE="$VERSION"
            if [[ "<< parameters.channel >>" == "alpha" ]]; then
              pnpm tauri build --target "<< parameters.target >>" --bundles app
            else
              pnpm tauri build --target "<< parameters.target >>"
            fi
      - run:
          name: Collect macOS artifacts
          command: |
            set -euo pipefail
            artifact_root="/tmp/tolaria-release/artifacts"
            updater_dir="${artifact_root}/updater-<< parameters.arch >>"
            dmg_dir="${artifact_root}/dmg-<< parameters.arch >>"
            mkdir -p "$updater_dir" "$dmg_dir"
            find "src-tauri/target/<< parameters.target >>/release/bundle/macos" \
              -maxdepth 1 -type f \( -name '*.app.tar.gz' -o -name '*.app.tar.gz.sig' \) \
              -exec cp {} "$updater_dir/" \;
            if [[ "<< parameters.channel >>" == "stable" ]]; then
              find "src-tauri/target/<< parameters.target >>/release/bundle/dmg" \
                -maxdepth 1 -type f -name '*.dmg' -exec cp {} "$dmg_dir/" \;
            fi
            test -n "$(find "$updater_dir" -name '*.app.tar.gz' -print -quit)"
            test -n "$(find "$updater_dir" -name '*.app.tar.gz.sig' -print -quit)"
      - save_pnpm_cache
      - save_rust_cache:
          target: << parameters.target >>
      - persist_to_workspace:
          root: /tmp/tolaria-release
          paths:
            - artifacts/updater-<< parameters.arch >>
            - artifacts/dmg-<< parameters.arch >>

  build-linux-release:
    parameters:
      channel:
        type: enum
        enum: [alpha, stable]
    machine:
      image: ubuntu-2204:current
    resource_class: xlarge
    environment:
      APPIMAGE_EXTRACT_AND_RUN: "1"
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - checkout
      - attach_release_workspace
      - halt_if_release_skipped
      - run:
          name: Install Linux release dependencies
          command: |
            sudo apt-get update
            sudo apt-get install -y \
              build-essential \
              cpio \
              curl \
              fcitx5-frontend-gtk3 \
              file \
              libayatana-appindicator3-dev \
              libfuse2 \
              librsvg2-dev \
              libsoup-3.0-dev \
              libssl-dev \
              libwebkit2gtk-4.1-dev \
              libxdo-dev \
              patchelf \
              pkg-config \
              rpm \
              wget
      - run:
          name: Configure Node, pnpm, and Rust
          command: |
            set -euo pipefail
            source "$HOME/.nvm/nvm.sh"
            nvm install 22
            nvm use 22
            sudo corepack enable
            corepack prepare pnpm@10.33.0 --activate
            if ! command -v rustup >/dev/null 2>&1; then
              curl --proto '=https' --tlsv1.2 -sSf -o /tmp/rustup-init.sh https://sh.rustup.rs
              sh /tmp/rustup-init.sh -y --profile minimal
            fi
            source "$HOME/.cargo/env"
            rustup default stable
            rustup target add x86_64-unknown-linux-gnu
            echo 'source "$HOME/.nvm/nvm.sh"' >> "$BASH_ENV"
            echo 'nvm use 22 >/dev/null' >> "$BASH_ENV"
            echo 'source "$HOME/.cargo/env"' >> "$BASH_ENV"
      - restore_pnpm_cache
      - restore_rust_cache:
          target: x86_64-unknown-linux-gnu
      - run:
          name: Install frontend dependencies
          command: pnpm install --frozen-lockfile
      - run:
          name: Clear cached bundle artifacts
          command: rm -rf src-tauri/target/x86_64-unknown-linux-gnu/release/bundle
      - configure_release_version
      - validate_release_secrets
      - run:
          name: Build Linux bundles
          command: |
            set -euo pipefail
            source /tmp/tolaria-release/release.env
            export TAURI_SIGNING_PRIVATE_KEY_PASSWORD="$TAURI_KEY_PASSWORD"
            export VITE_SENTRY_RELEASE="$VERSION"
            pnpm tauri build --target x86_64-unknown-linux-gnu --bundles deb,rpm,appimage
      - run:
          name: Validate and collect Linux bundles
          command: |
            set -euo pipefail
            shopt -s nullglob
            bundle_root="src-tauri/target/x86_64-unknown-linux-gnu/release/bundle"
            appimages=("$bundle_root"/appimage/*.AppImage)
            installers=("${appimages[@]}" "$bundle_root"/deb/*.deb "$bundle_root"/rpm/*.rpm)
            signatures=(
              "$bundle_root"/appimage/*.AppImage.sig
              "$bundle_root"/appimage/*.AppImage.tar.gz.sig
              "$bundle_root"/deb/*.deb.sig
            )
            if (( ${#appimages[@]} == 0 || ${#installers[@]} == 0 || ${#signatures[@]} == 0 )); then
              echo "Linux build did not produce all required installers and updater signatures." >&2
              exit 1
            fi
            validate_desktop_categories() {
              local package_path="$1"
              local extract_dir="$2"
              rm -rf "$extract_dir"
              mkdir -p "$extract_dir"
              case "$package_path" in
                *.deb) dpkg-deb -x "$package_path" "$extract_dir" ;;
                *.rpm) (cd "$extract_dir" && rpm2cpio "$CIRCLE_WORKING_DIRECTORY/$package_path" | cpio -id --quiet) ;;
                *) return 1 ;;
              esac
              mapfile -t desktop_files < <(find "$extract_dir/usr/share/applications" -type f -name '*.desktop' 2>/dev/null)
              (( ${#desktop_files[@]} > 0 ))
              for desktop_file in "${desktop_files[@]}"; do
                categories="$(grep '^Categories=' "$desktop_file" | cut -d= -f2-)"
                [[ -n "$categories" && "$categories" == *";" ]]
                [[ ";$categories" == *";Office;"* || ";$categories" == *";Utility;"* ]]
              done
            }
            for package in "$bundle_root"/deb/*.deb "$bundle_root"/rpm/*.rpm; do
              validate_desktop_categories "$package" "/tmp/tolaria-package-validation"
            done
            artifact_dir="/tmp/tolaria-release/artifacts/linux-x86_64-bundles"
            mkdir -p "$artifact_dir"
            find "$bundle_root" -type f \
              \( -name '*.deb' -o -name '*.deb.sig' -o -name '*.rpm' -o -name '*.AppImage' \
              -o -name '*.AppImage.sig' -o -name '*.AppImage.tar.gz' -o -name '*.AppImage.tar.gz.sig' \) \
              -exec cp {} "$artifact_dir/" \;
      - save_pnpm_cache
      - save_rust_cache:
          target: x86_64-unknown-linux-gnu
      - persist_to_workspace:
          root: /tmp/tolaria-release
          paths:
            - artifacts/linux-x86_64-bundles

  build-windows-release:
    parameters:
      channel:
        type: enum
        enum: [alpha, stable]
    machine:
      image: windows-server-2022-gui:current
      shell: powershell.exe -ExecutionPolicy Bypass
    resource_class: windows.large
    environment:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - checkout
      - attach_workspace:
          at: "C:\\tmp\\tolaria-release"
      - run:
          name: Check whether this release should run
          command: |
            $release = @{}
            Get-Content "C:\tmp\tolaria-release\release.env" | ForEach-Object {
              $name, $value = $_ -split "=", 2
              $release[$name] = $value
            }
            if ($release["SKIP_RELEASE"] -eq "true") {
              Write-Host "Release skipped because this push only changed CI or site files."
              circleci-agent step halt
            }
      - run:
          name: Configure Node, pnpm, and Rust
          command: |
            choco upgrade nodejs --version=22.14.0 --allow-downgrade --yes
            $env:Path = "C:\Program Files\nodejs;$env:USERPROFILE\.cargo\bin;$env:Path"
            corepack enable
            corepack prepare pnpm@10.33.0 --activate
            if (-not (Get-Command rustup -ErrorAction SilentlyContinue)) {
              Invoke-WebRequest -Uri "https://static.rust-lang.org/rustup/dist/x86_64-pc-windows-msvc/rustup-init.exe" -OutFile "$env:TEMP\rustup-init.exe"
              & "$env:TEMP\rustup-init.exe" -y --profile minimal
            }
            rustup default stable
            rustup target add x86_64-pc-windows-msvc
      - restore_cache:
          keys:
            - windows-node-v1-{{ checksum "pnpm-lock.yaml" }}
            - windows-node-v1-
      - restore_cache:
          keys:
            - windows-rust-release-v2026-07-24-{{ checksum "src-tauri/Cargo.lock" }}
            - windows-rust-release-v2026-07-24-
      - restore_cache:
          keys:
            - windows-tauri-tools-nsis-3.11-tauri-utils-0.5.3
      - run:
          name: Install dependencies and prefetch NSIS
          command: |
            $env:Path = "C:\Program Files\nodejs;$env:USERPROFILE\.cargo\bin;$env:Path"
            corepack prepare pnpm@10.33.0 --activate
            pnpm install --frozen-lockfile
            ./.github/scripts/prefetch-tauri-nsis.ps1
      - run:
          name: Set application version
          command: |
            $release = @{}
            Get-Content "C:\tmp\tolaria-release\release.env" | ForEach-Object {
              $name, $value = $_ -split "=", 2
              $release[$name] = $value
            }
            $version = $release["VERSION"]
            $tauri = Get-Content "src-tauri/tauri.conf.json" | ConvertFrom-Json
            $tauri.version = $version
            $tauri | ConvertTo-Json -Depth 100 | Set-Content "src-tauri/tauri.conf.json"
            (Get-Content "src-tauri/Cargo.toml") -replace '^version = ".*"$', "version = `"$version`"" |
              Set-Content "src-tauri/Cargo.toml"
      - run:
          name: Validate release environment and configure Authenticode
          command: |
            $required = @(
              "TAURI_SIGNING_PRIVATE_KEY",
              "TAURI_KEY_PASSWORD",
              "VITE_SENTRY_DSN",
              "SENTRY_DSN",
              "VITE_POSTHOG_KEY",
              "VITE_POSTHOG_HOST"
            )
            foreach ($name in $required) {
              if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
                throw "$name is required for release builds."
              }
            }
            $certificate = if ($env:WINDOWS_CODE_SIGNING_CERTIFICATE) {
              $env:WINDOWS_CODE_SIGNING_CERTIFICATE
            } else {
              $env:WINDOWS_CERTIFICATE
            }
            $password = if ($env:WINDOWS_CODE_SIGNING_CERTIFICATE_PASSWORD) {
              $env:WINDOWS_CODE_SIGNING_CERTIFICATE_PASSWORD
            } else {
              $env:WINDOWS_CERTIFICATE_PASSWORD
            }
            if ([bool]$certificate -ne [bool]$password) {
              throw "Windows Authenticode signing is partially configured."
            }
            if ($certificate) {
              ./.github/scripts/configure-windows-authenticode.ps1
              "true" | Set-Content "C:\tmp\tolaria-release\authenticode.txt"
            } else {
              Write-Warning "Authenticode certificate is not configured; updater signatures remain required."
              "false" | Set-Content "C:\tmp\tolaria-release\authenticode.txt"
            }
      - run:
          name: Build Windows bundle
          command: |
            $release = @{}
            Get-Content "C:\tmp\tolaria-release\release.env" | ForEach-Object {
              $name, $value = $_ -split "=", 2
              $release[$name] = $value
            }
            $env:Path = "C:\Program Files\nodejs;$env:USERPROFILE\.cargo\bin;$env:Path"
            $env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD = $env:TAURI_KEY_PASSWORD
            $env:VITE_SENTRY_RELEASE = $release["VERSION"]
            corepack prepare pnpm@10.33.0 --activate
            $authenticodeAvailable = (Get-Content "C:\tmp\tolaria-release\authenticode.txt").Trim()
            if ($authenticodeAvailable -eq "true") {
              pnpm tauri build --target x86_64-pc-windows-msvc --bundles nsis --config src-tauri/tauri.windows-signing.conf.json
            } else {
              pnpm tauri build --target x86_64-pc-windows-msvc --bundles nsis
            }
      - run:
          name: Validate and collect Windows bundles
          command: |
            $release = @{}
            Get-Content "C:\tmp\tolaria-release\release.env" | ForEach-Object {
              $name, $value = $_ -split "=", 2
              $release[$name] = $value
            }
            $bundleRoot = "src-tauri\target\x86_64-pc-windows-msvc\release\bundle"
            $installers = @(
              Get-ChildItem "$bundleRoot\nsis\*-setup.exe" -File -ErrorAction SilentlyContinue
              Get-ChildItem "$bundleRoot\msi\*.msi" -File -ErrorAction SilentlyContinue
            )
            $signatures = @(
              Get-ChildItem "$bundleRoot\nsis\*.sig" -File -ErrorAction SilentlyContinue
              Get-ChildItem "$bundleRoot\msi\*.sig" -File -ErrorAction SilentlyContinue
            )
            if ($installers.Count -eq 0 -or $signatures.Count -eq 0) {
              throw "Windows build did not produce installers and updater signatures."
            }
            $authenticodeAvailable = (Get-Content "C:\tmp\tolaria-release\authenticode.txt").Trim()
            foreach ($installer in $installers) {
              if ($installer.Name -notlike "*$($release['VERSION'])*") {
                throw "Installer has an unexpected version: $($installer.Name)"
              }
              if ($authenticodeAvailable -eq "true") {
                $signature = Get-AuthenticodeSignature -FilePath $installer.FullName
                if ($signature.Status -ne "Valid") {
                  throw "Invalid Authenticode signature for $($installer.FullName): $($signature.Status)"
                }
              }
            }
            $artifactDir = "C:\tmp\tolaria-release\artifacts\windows-x86_64-bundles"
            New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null
            Get-ChildItem "$bundleRoot\nsis\*" -File -ErrorAction SilentlyContinue | Copy-Item -Destination $artifactDir
            Get-ChildItem "$bundleRoot\msi\*" -File -ErrorAction SilentlyContinue | Copy-Item -Destination $artifactDir
      - save_cache:
          key: windows-node-v1-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - ~\AppData\Local\pnpm\store
      - save_cache:
          key: windows-rust-release-v2026-07-24-{{ checksum "src-tauri/Cargo.lock" }}
          paths:
            - ~\.cargo\registry
            - ~\.cargo\git
            - src-tauri\target
      - save_cache:
          key: windows-tauri-tools-nsis-3.11-tauri-utils-0.5.3
          paths:
            - ~\AppData\Local\tauri
      - persist_to_workspace:
          root: "C:\\tmp\\tolaria-release"
          paths:
            - artifacts/windows-x86_64-bundles

  publish-github-release:
    parameters:
      channel:
        type: enum
        enum: [alpha, stable]
    docker:
      - image: cimg/node:22.14.0
    resource_class: medium
    steps:
      - checkout
      - attach_release_workspace
      - halt_if_release_skipped
      - run:
          name: Validate publishing credentials
          command: |
            if [[ -z "${GH_TOKEN:-}" ]]; then
              echo "GH_TOKEN is required to publish GitHub releases." >&2
              exit 1
            fi
            gh auth status
      - run:
          name: Normalize release artifacts
          command: |
            set -euo pipefail
            source /tmp/tolaria-release/release.env
            cd /tmp/tolaria-release/artifacts
            normalize_updater() {
              local arch="$1"
              local output_name="$2"
              local artifact_dir="updater-${arch}"
              local updater_file
              updater_file="$(find "$artifact_dir" -maxdepth 1 -name '*.app.tar.gz' -print -quit)"
              [[ -n "$updater_file" && -f "${updater_file}.sig" ]]
              mv "$updater_file" "${artifact_dir}/${output_name}"
              mv "${updater_file}.sig" "${artifact_dir}/${output_name}.sig"
            }
            normalize_updater aarch64 "Tolaria_${VERSION}_macOS_Silicon.app.tar.gz"
            normalize_updater x86_64 "Tolaria_${VERSION}_macOS_Intel.app.tar.gz"
            if [[ "<< parameters.channel >>" == "stable" ]]; then
              arm_dmg="$(find dmg-aarch64 -maxdepth 1 -name '*.dmg' -print -quit)"
              intel_dmg="$(find dmg-x86_64 -maxdepth 1 -name '*.dmg' -print -quit)"
              [[ -n "$arm_dmg" && -n "$intel_dmg" ]]
              mv "$arm_dmg" "dmg-aarch64/Tolaria_${VERSION}_macOS_Silicon.dmg"
              mv "$intel_dmg" "dmg-x86_64/Tolaria_${VERSION}_macOS_Intel.dmg"
            fi
      - run:
          name: Generate release notes and updater manifest
          command: |
            set -euo pipefail
            source /tmp/tolaria-release/release.env
            artifact_root="/tmp/tolaria-release/artifacts"
            git fetch --tags --force
            if [[ "<< parameters.channel >>" == "stable" && -f "release-notes/${TAG}.md" ]]; then
              cp "release-notes/${TAG}.md" /tmp/tolaria-release/release-notes.md
            else
              if [[ "<< parameters.channel >>" == "alpha" ]]; then
                previous_tag="$(
                  git tag --list 'alpha-v*' |
                    grep -vx "$TAG" |
                    sort -V |
                    tail -n 1 || true
                )"
                heading="## What's Changed (Alpha)"
              else
                previous_tag="$(
                  git for-each-ref --sort=-creatordate --format='%(refname:short)' \
                    'refs/tags/v20*' 'refs/tags/stable-v*' |
                    grep -vx "$TAG" |
                    head -n 1 || true
                )"
                heading="## What's Changed"
              fi
              if [[ -n "$previous_tag" ]]; then
                notes="$(git log --oneline --no-merges "${previous_tag}..HEAD")"
              else
                notes="$(git log --oneline --no-merges -20)"
              fi
              {
                echo "$heading"
                echo
                while IFS= read -r line; do
                  [[ -n "$line" ]] && printf -- '- %s\n' "$line"
                done \<<<"$notes"
              } > /tmp/tolaria-release/release-notes.md
            fi
            {
              echo
              echo "---"
              if [[ "<< parameters.channel >>" == "alpha" ]]; then
                echo '**Alpha build — updated on every qualifying push to `main`**'
              else
                echo '**Stable release — manually promoted from `main`**'
              fi
              echo
              echo '**Includes macOS (Apple Silicon and Intel), Linux x64, and Windows x64 bundles**'
              echo
              echo "*Built from \`$(git rev-parse --short HEAD)\` on $(date -u +%Y-%m-%d)*"
            } >> /tmp/tolaria-release/release-notes.md

            find_required() {
              local pattern
              local match
              for pattern in "$@"; do
                match="$(compgen -G "${artifact_root}/${pattern}" | head -n 1 || true)"
                if [[ -n "$match" ]]; then
                  printf '%s\n' "$match"
                  return 0
                fi
              done
              echo "Missing required artifact matching: $*" >&2
              return 1
            }

            arm_signature_file="$(find_required 'updater-aarch64/*.app.tar.gz.sig')"
            arm_updater_file="${arm_signature_file%.sig}"
            intel_signature_file="$(find_required 'updater-x86_64/*.app.tar.gz.sig')"
            intel_updater_file="${intel_signature_file%.sig}"
            linux_signature_file="$(find_required \
              'linux-x86_64-bundles/*.AppImage.sig' \
              'linux-x86_64-bundles/*.AppImage.tar.gz.sig' \
              'linux-x86_64-bundles/*.deb.sig')"
            linux_updater_file="${linux_signature_file%.sig}"
            linux_download_file="$(find_required \
              'linux-x86_64-bundles/*.AppImage' \
              'linux-x86_64-bundles/*.deb' \
              'linux-x86_64-bundles/*.AppImage.tar.gz')"
            windows_signature_file="$(find_required \
              'windows-x86_64-bundles/*-setup.exe.sig' \
              'windows-x86_64-bundles/*.msi.sig' \
              'windows-x86_64-bundles/*.nsis.zip.sig' \
              'windows-x86_64-bundles/*.msi.zip.sig')"
            windows_updater_file="${windows_signature_file%.sig}"
            windows_download_file="$(find_required \
              'windows-x86_64-bundles/*-setup.exe' \
              'windows-x86_64-bundles/*.msi' \
              'windows-x86_64-bundles/*.nsis.zip' \
              'windows-x86_64-bundles/*.msi.zip')"

            repo="refactoringhq/tolaria"
            base_url="https://github.com/${repo}/releases/download/${TAG}"
            common_args=(
              --arg version "$VERSION"
              --arg notes "<< parameters.channel >> release. See https://tolaria.md/ for full release notes."
              --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
              --arg arm_signature "$(cat "$arm_signature_file")"
              --arg arm_updater "${base_url}/$(basename "$arm_updater_file")"
              --arg intel_signature "$(cat "$intel_signature_file")"
              --arg intel_updater "${base_url}/$(basename "$intel_updater_file")"
              --arg linux_signature "$(cat "$linux_signature_file")"
              --arg linux_updater "${base_url}/$(basename "$linux_updater_file")"
              --arg linux_download "${base_url}/$(basename "$linux_download_file")"
              --arg windows_signature "$(cat "$windows_signature_file")"
              --arg windows_updater "${base_url}/$(basename "$windows_updater_file")"
              --arg windows_download "${base_url}/$(basename "$windows_download_file")"
            )
            if [[ "<< parameters.channel >>" == "stable" ]]; then
              arm_dmg_file="$(find_required 'dmg-aarch64/*.dmg')"
              intel_dmg_file="$(find_required 'dmg-x86_64/*.dmg')"
              jq -n "${common_args[@]}" \
                --arg arm_dmg "${base_url}/$(basename "$arm_dmg_file")" \
                --arg intel_dmg "${base_url}/$(basename "$intel_dmg_file")" \
                '{
                  version: $version,
                  notes: $notes,
                  pub_date: $pub_date,
                  platforms: {
                    "darwin-aarch64": {signature: $arm_signature, url: $arm_updater, dmg_url: $arm_dmg},
                    "darwin-x86_64": {signature: $intel_signature, url: $intel_updater, dmg_url: $intel_dmg},
                    "linux-x86_64": {signature: $linux_signature, url: $linux_updater, download_url: $linux_download},
                    "windows-x86_64": {signature: $windows_signature, url: $windows_updater, download_url: $windows_download}
                  }
                }' > /tmp/tolaria-release/stable-latest.json
            else
              jq -n "${common_args[@]}" \
                '{
                  version: $version,
                  notes: $notes,
                  pub_date: $pub_date,
                  platforms: {
                    "darwin-aarch64": {signature: $arm_signature, url: $arm_updater, download_url: $arm_updater},
                    "darwin-x86_64": {signature: $intel_signature, url: $intel_updater, download_url: $intel_updater},
                    "linux-x86_64": {signature: $linux_signature, url: $linux_updater, download_url: $linux_download},
                    "windows-x86_64": {signature: $windows_signature, url: $windows_updater, download_url: $windows_download}
                  }
                }' > /tmp/tolaria-release/alpha-latest.json
            fi
      - run:
          name: Publish GitHub release
          command: |
            set -euo pipefail
            source /tmp/tolaria-release/release.env
            artifact_root="/tmp/tolaria-release/artifacts"
            manifest="/tmp/tolaria-release/<< parameters.channel >>-latest.json"
            title="Tolaria ${DISPLAY_VERSION}"
            if gh release view "$TAG" --repo refactoringhq/tolaria >/dev/null 2>&1; then
              if [[ "<< parameters.channel >>" == "alpha" ]]; then
                gh release edit "$TAG" \
                  --repo refactoringhq/tolaria \
                  --title "$title" \
                  --notes-file /tmp/tolaria-release/release-notes.md \
                  --prerelease
              else
                gh release edit "$TAG" \
                  --repo refactoringhq/tolaria \
                  --title "$title" \
                  --notes-file /tmp/tolaria-release/release-notes.md
              fi
            else
              create_args=(
                "$TAG"
                --repo refactoringhq/tolaria
                --target "$CIRCLE_SHA1"
                --title "$title"
                --notes-file /tmp/tolaria-release/release-notes.md
              )
              if [[ "<< parameters.channel >>" == "alpha" ]]; then
                create_args+=(--prerelease)
              fi
              gh release create "${create_args[@]}"
            fi
            mapfile -d '' release_files < <(find "$artifact_root" -type f -print0)
            release_files+=("$manifest")
            gh release upload "$TAG" \
              --repo refactoringhq/tolaria \
              --clobber \
              "${release_files[@]}"

  publish-docs:
    executor: node
    steps:
      - checkout
      - install_frontend_dependencies
      - run:
          name: Validate GitHub publishing credentials
          command: |
            if [[ -z "${GH_TOKEN:-}" ]]; then
              echo "GH_TOKEN is required to publish documentation." >&2
              exit 1
            fi
            gh auth status
      - run:
          name: Build documentation and release pages
          command: |
            set -euo pipefail
            VITEPRESS_BASE="/" pnpm docs:build
            dist="site/.vitepress/dist"
            mkdir -p "$dist/alpha" "$dist/stable" "$dist/download" "$dist/releases" "$dist/stable/download"
            gh api \
              -H "Accept: application/vnd.github.html+json" \
              repos/refactoringhq/tolaria/releases \
              --paginate > "$dist/releases.json"
            stable_tag="$(
              gh release list \
                --repo refactoringhq/tolaria \
                --limit 100 \
                --json tagName,isDraft,isPrerelease \
                --jq '[.[] | select(.isDraft == false and .isPrerelease == false)][0].tagName // ""'
            )"
            if [[ -n "$stable_tag" ]]; then
              gh release download \
                --repo refactoringhq/tolaria \
                "$stable_tag" \
                --pattern stable-latest.json \
                --output "$dist/stable/latest.json" ||
                printf '{}\n' > "$dist/stable/latest.json"
            else
              printf '{}\n' > "$dist/stable/latest.json"
            fi
            alpha_tag="$(
              gh release list \
                --repo refactoringhq/tolaria \
                --limit 100 \
                --json tagName,isDraft,isPrerelease \
                --jq '[.[] | select(.isDraft == false and .isPrerelease == true)][0].tagName // ""'
            )"
            if [[ -n "$alpha_tag" ]]; then
              gh release download \
                --repo refactoringhq/tolaria \
                "$alpha_tag" \
                --pattern alpha-latest.json \
                --output "$dist/alpha/latest.json" ||
                printf '{}\n' > "$dist/alpha/latest.json"
            else
              printf '{}\n' > "$dist/alpha/latest.json"
            fi
            bun scripts/build-release-download-page.ts \
              --latest-json "$dist/stable/latest.json" \
              --releases-json "$dist/releases.json" \
              --output-file "$dist/download/index.html"
            bun scripts/build-release-history-page.ts \
              --releases-json "$dist/releases.json" \
              --output-file "$dist/releases/index.html"
            cp "$dist/download/index.html" "$dist/stable/download/index.html"
            cp "$dist/alpha/latest.json" "$dist/latest.json"
            cp "$dist/alpha/latest.json" "$dist/latest-canary.json"
            touch "$dist/.nojekyll"
      - run:
          name: Publish gh-pages branch
          command: |
            set -euo pipefail
            gh auth setup-git
            deploy_dir="$(mktemp -d)"
            if git clone \
              --branch gh-pages \
              --single-branch \
              "https://github.com/refactoringhq/tolaria.git" \
              "$deploy_dir"; then
              :
            else
              git clone --no-checkout "https://github.com/refactoringhq/tolaria.git" "$deploy_dir"
              git -C "$deploy_dir" checkout --orphan gh-pages
              git -C "$deploy_dir" rm -rf . >/dev/null 2>&1 || true
            fi
            rsync -a --delete --exclude .git/ site/.vitepress/dist/ "$deploy_dir/"
            git -C "$deploy_dir" config user.name "Tolaria CircleCI"
            git -C "$deploy_dir" config user.email "ci@tolaria.md"
            git -C "$deploy_dir" add --all
            if git -C "$deploy_dir" diff --cached --quiet; then
              echo "Documentation output is unchanged."
              exit 0
            fi
            git -C "$deploy_dir" commit -m "docs: publish ${CIRCLE_SHA1:0:12}"
            git -C "$deploy_dir" push origin gh-pages

  update-pr-branches:
    docker:
      - image: cimg/base:2026.07
    resource_class: small
    steps:
      - run:
          name: Update open pull request branches
          command: |
            set -euo pipefail
            if [[ -z "${GH_TOKEN:-}" ]]; then
              echo "GH_TOKEN is required to update pull request branches." >&2
              exit 1
            fi
            gh pr list \
              --repo refactoringhq/tolaria \
              --base main \
              --state open \
              --json number \
              --jq '.[].number' |
              while IFS= read -r number; do
                if ! gh pr update-branch "$number" --repo refactoringhq/tolaria; then
                  echo "PR #${number} is already current or has a merge conflict."
                fi
              done

workflows:
  validation:
    jobs:
      - frontend-quality:
          context: tolaria-ci
          filters:
            branches:
              ignore: gh-pages
            tags:
              ignore: /.*/
      - rust-quality:
          filters:
            branches:
              ignore: gh-pages
            tags:
              ignore: /.*/
      - playwright-smoke:
          filters:
            branches:
              ignore: gh-pages
            tags:
              ignore: /.*/
      - linux-build-verification:
          filters:
            branches:
              ignore:
                - main
                - gh-pages
            tags:
              ignore: /.*/

  alpha-release:
    jobs:
      - compute-alpha-version:
          filters:
            branches:
              only: main
            tags:
              ignore: /.*/
      - build-macos:
          name: alpha-macos-aarch64
          channel: alpha
          arch: aarch64
          target: aarch64-apple-darwin
          context: tolaria-release
          requires:
            - compute-alpha-version
          filters:
            branches:
              only: main
            tags:
              ignore: /.*/
      - build-macos:
          name: alpha-macos-x86_64
          channel: alpha
          arch: x86_64
          target: x86_64-apple-darwin
          context: tolaria-release
          requires:
            - compute-alpha-version
          filters:
            branches:
              only: main
            tags:
              ignore: /.*/
      - build-linux-release:
          name: alpha-linux-x86_64
          channel: alpha
          context: tolaria-release
          requires:
            - compute-alpha-version
          filters:
            branches:
              only: main
            tags:
              ignore: /.*/
      - build-windows-release:
          name: alpha-windows-x86_64
          channel: alpha
          context: tolaria-release
          requires:
            - compute-alpha-version
          filters:
            branches:
              only: main
            tags:
              ignore: /.*/
      - publish-github-release:
          name: publish-alpha-release
          channel: alpha
          context: tolaria-github
          requires:
            - alpha-macos-aarch64
            - alpha-macos-x86_64
            - alpha-linux-x86_64
            - alpha-windows-x86_64
          filters:
            branches:
              only: main
            tags:
              ignore: /.*/
      - publish-docs:
          name: publish-main-docs
          context: tolaria-github
          requires:
            - publish-alpha-release
          filters:
            branches:
